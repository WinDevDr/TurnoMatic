<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Page</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .button {
            display: block;
            width: 200px;
            height: 200px;
            margin: 20px;
            text-align: center;
            line-height: 200px;
            font-size: 20px;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <a class="button" href="#">Facturación</a>
    <a class="button" href="#">Consulta</a>
    <a class="button" href="#">Laboratorio</a>
    <a class="button" href="#">Farmacia</a>
    <a class="button" href="#">Emergencias</a>
</body>
</html>
